<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <meta name="description" content="专业银行卡号生成与靓号计算。支持规则定制、特定数字排除及特征自动打标。">
    <meta property="og:title" content="银行卡号生成器">
    <meta property="og:description" content="精准计算靓号号段，一键生成组合，支持多维过滤与导出。">
    
    <title>银行卡号生成器</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="toast" class="toast"></div>

    <main>
        <h1>💳 银行卡号生成器</h1>
        <p class="subtitle">输入卡号规则极速生成组合，满足 Luhn 算法校验，支持特定数字排除与特征打标</p>
        
        <div class="input-group">
            <input type="text" id="inputField" placeholder="例如输入: 6226 0281 12*a abbb" autofocus maxlength="100">
            <button id="calcBtn" class="btn btn-primary">生成卡号</button>
            <button id="stopBtn" class="btn btn-danger" style="display: none;">停止</button>
            <button id="clearBtn" class="btn btn-outline">清空</button>
        </div>

        <button id="toggleAdvBtn" class="btn btn-text">⚙️ 展开高级筛选选项 <span class="toggle-icon">▼</span></button>

        <div class="advanced-panel" id="advPanel">
            <div class="adv-desc" style="color: var(--primary); font-weight: 600; font-size: 13px;">💡 注：以下排除规则仅限制 * 和字母等计算变量。</div>
            
            <div>
                <div class="adv-title">不包含的数字</div>
                <div class="checkbox-grid" id="numberCheckboxes">
                    <label><input type="checkbox" value="0"> 0</label>
                    <label><input type="checkbox" value="1"> 1</label>
                    <label><input type="checkbox" value="2"> 2</label>
                    <label><input type="checkbox" value="3"> 3</label>
                    <label><input type="checkbox" value="4"> 4</label>
                    <label><input type="checkbox" value="5"> 5</label>
                    <label><input type="checkbox" value="6"> 6</label>
                    <label><input type="checkbox" value="7"> 7</label>
                    <label><input type="checkbox" value="8"> 8</label>
                    <label><input type="checkbox" value="9"> 9</label>
                </div>
            </div>
            <div>
                <div class="adv-title">不包含的奇偶</div>
                <div class="checkbox-grid">
                    <label><input type="checkbox" id="excludeOdd"> 排除奇数 (1, 3, 5, 7, 9)</label>
                    <label><input type="checkbox" id="excludeEven"> 排除偶数 (0, 2, 4, 6, 8)</label>
                </div>
            </div>
        </div>

        <div class="dashboard">
            <div>格式有效位：<span id="validCount" class="stat-num">0</span> 位 
                <span id="lenWarning" style="color: var(--color-star); font-size: 13px; font-weight: normal; display: none; margin-left: 8px;">(💡 已超出常规 19 位长度)</span>
            </div>
            <div>生成数量：<span id="count" class="stat-num">0</span> 条</div>
            <div style="display: flex; gap: 10px;">
                <button id="copyPageBtn" class="btn btn-outline" style="height: 32px; padding: 0 12px; font-size: 13px; display: none;">复制本页</button>
                <button id="downloadBtn" class="btn btn-primary" style="height: 32px; padding: 0 12px; font-size: 13px; display: none;">下载结果(.csv)</button>
            </div>
        </div>

        <div id="dynamic-legend" style="display: none;"></div>

        <div class="terminal-wrap">
            <span id="status-bar">✓ 计算完成</span>
            <div id="result-container">
                <div class="empty-placeholder">💳 等待输入卡号规则...</div>
            </div>
        </div>

        <div class="pagination" id="pagination" style="display: none;">
            <button id="firstPageBtn" title="跳转至第一页">首页</button>
            <div class="pagination-center">
                <button id="prevBtn">上一页</button>
                <div class="page-jumper">
                    <input type="text" id="pageInput" value="1" inputmode="numeric">
                    <span class="page-slash">/</span> <span id="totalPages">1</span>
                </div>
                <button id="nextBtn">下一页</button>
            </div>
            <button id="lastPageBtn" title="跳转至最后一页">尾页</button>
        </div>
    </main>

    <footer>
        <p>&copy; 2023 <a href="https://www.linchun.com.cn" target="_blank">林春写字的地方</a></p>
    </footer>

    <script src="app.js"></script>

    <script async src="https://www.googletagmanager.com/gtag/js?id=G-K2S9L4CHNP"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-K2S9L4CHNP');
    </script>
</body>
</html>
